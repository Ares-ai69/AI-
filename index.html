<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AI关键词提取</title>
<style>
body{max-width:700px;margin:30px auto;font-family:Arial;padding:0 20px;}
.info{text-align:center;color:#333;margin-bottom:20px;}
textarea{width:100%;height:120px;padding:10px;font-size:16px;}
button{padding:10px 20px;margin:10px 0;}
.params{margin:10px 0;}
#result{font-size:18px;color:#0056b3;}
</style>
</head>
<body>

<!-- 学号 姓名 -->
<div class="info">
  <h3>学号：20260001</h3>
  <h3>姓名：张三</h3>
</div>

<h2>AI 智能关键词提取</h2>
<textarea id="text" placeholder="输入一段文字..."></textarea>
<button onclick="runAI()">AI 提取</button>

<div class="params">
  灵敏度：<input type="range" id="score" min="0.1" max="0.9" step="0.1" value="0.5">
  最大数量：<input type="range" id="max" min="1" max="10" value="5">
</div>

<h3>结果：<span id="result"></span></h3>

<script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.15.1"></script>
<script src="script.js"></script>
</body>
</html>
